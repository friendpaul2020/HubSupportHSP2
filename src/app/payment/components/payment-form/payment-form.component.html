<div class="payment-form-container">
  <h2>Crear Ticket de Soporte con Pago</h2>

  <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" formControlName="userName" class="form-control">
        <div class="error" *ngIf="ticketForm.get('userName')?.invalid && ticketForm.get('userName')?.touched">
          Nombre es requerido
        </div>
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" formControlName="userEmail" class="form-control">
        <div class="error" *ngIf="ticketForm.get('userEmail')?.invalid && ticketForm.get('userEmail')?.touched">
          Email válido es requerido
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Asunto del ticket *</label>
      <input type="text" formControlName="subject" class="form-control">
      <div class="error" *ngIf="ticketForm.get('subject')?.invalid && ticketForm.get('subject')?.touched">
        El asunto debe tener al menos 5 caracteres
      </div>
    </div>

    <div class="form-group">
      <label>Descripción del problema *</label>
      <textarea formControlName="description" rows="4" class="form-control"></textarea>
      <div class="error" *ngIf="ticketForm.get('description')?.invalid && ticketForm.get('description')?.touched">
        La descripción debe tener al menos 10 caracteres
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Categoría</label>
        <select formControlName="category" class="form-control">
          <option value="tecnico">📱 Soporte Técnico - $10 USD</option>
          <option value="soporte">💬 Soporte General - $15 USD</option>
          <option value="facturacion">💰 Facturación - $5 USD</option>
          <option value="general">📋 General - $8 USD</option>
        </select>
      </div>

      <div class="form-group">
        <label>Prioridad</label>
        <select formControlName="priority" class="form-control">
          <option value="baja">🟢 Baja</option>
          <option value="media">🟡 Media</option>
          <option value="alta">🔴 Alta</option>
        </select>
      </div>
    </div>

    <div class="payment-info">
      <h3>Total a pagar: <strong>${{ getCurrentAmount() / 100 }} USD</strong></h3>
    </div>

    <div class="form-group">
      <label>Datos de tarjeta</label>
      <div #cardElement class="stripe-card-element"></div>
    </div>

    <div class="form-group checkbox">
      <label>
        <input type="checkbox" formControlName="acceptTerms">
        Acepto los términos y condiciones
      </label>
    </div>

    <button type="submit" class="btn-pay" [disabled]="isProcessing || ticketForm.invalid">
      {{ isProcessing ? 'Procesando pago...' : 'Pagar y crear ticket' }}
    </button>
  </form>
</div>
